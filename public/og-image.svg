<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="og-title og-desc"
>
  <title id="og-title">FlächenKlar — Aufmaß-Werkzeug für bayerische Bauämter</title>
  <desc id="og-desc">
    OpenGraph-Bild für flaechenklar.de. Dunkelblauer Hintergrund mit
    Bauplan-Raster, Logo-Icon links, Headline und Tagline rechts, teal-farbene
    Aufmaß-Linien als Akzent.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4778" />
      <stop offset="0.55" stop-color="#173965" />
      <stop offset="1" stop-color="#0F294B" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58D6CA" />
      <stop offset="1" stop-color="#20AFA3" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path
        d="M 32 0 L 0 0 0 32"
        fill="none"
        stroke="#FFFFFF"
        stroke-opacity="0.05"
        stroke-width="1"
      />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Floor-plan icon, left -->
  <g transform="translate(90, 195) scale(1.7)">
    <rect width="140" height="140" rx="28" fill="#FFFFFF" fill-opacity="0.06" />
    <path
      d="M28 33 H78 V64 H58 V86 H28 Z"
      fill="#FFFFFF"
      fill-opacity="0.10"
      stroke="#FFFFFF"
      stroke-width="6"
      stroke-linejoin="round"
    />
    <path
      d="M58 64 H78 M58 64 V86"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="3.5"
      stroke-linecap="round"
      stroke-opacity="0.6"
    />
    <path
      d="M28 19 H78 M28 14 V24 M78 14 V24"
      fill="none"
      stroke="url(#accent)"
      stroke-width="3.5"
      stroke-linecap="round"
    />
    <path
      d="M92 33 V64 M87 33 H97 M87 64 H97"
      fill="none"
      stroke="url(#accent)"
      stroke-width="3.5"
      stroke-linecap="round"
    />
    <circle cx="92" cy="86" r="4.5" fill="#58D6CA" />
  </g>

  <!-- Tag pill -->
  <g transform="translate(440, 175)">
    <rect width="240" height="32" rx="16" fill="#20AFA3" fill-opacity="0.18" stroke="#58D6CA" stroke-opacity="0.5" />
    <circle cx="18" cy="16" r="3" fill="#58D6CA" />
    <text
      x="32"
      y="21"
      font-family="ui-sans-serif, system-ui, sans-serif"
      font-size="13"
      font-weight="600"
      fill="#58D6CA"
      letter-spacing="1.5"
    >FLÄCHENKLAR — BAUAMT TOOL</text>
  </g>

  <!-- Headline -->
  <text
    x="440"
    y="290"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-2"
  >Geschossflächen</text>
  <text
    x="440"
    y="372"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="72"
    font-weight="800"
    fill="#FFFFFF"
    letter-spacing="-2"
  >ohne Lineal.</text>

  <!-- Teal underline accent -->
  <path
    d="M 440 392 L 720 392"
    stroke="url(#accent)"
    stroke-width="5"
    stroke-linecap="round"
    opacity="0.95"
  />

  <!-- Subhead -->
  <text
    x="440"
    y="450"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#FFFFFF"
    fill-opacity="0.78"
  >Aufmaß-Werkzeug für bayerische Bauämter.</text>
  <text
    x="440"
    y="488"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="26"
    font-weight="400"
    fill="#FFFFFF"
    fill-opacity="0.78"
  >PDF rein, Polygon zeichnen, Protokoll als PDF.</text>

  <!-- Domain footer -->
  <text
    x="440"
    y="560"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="20"
    font-weight="600"
    fill="#58D6CA"
    letter-spacing="0.5"
  >flaechenklar.de</text>
  <text
    x="600"
    y="560"
    font-family="ui-sans-serif, system-ui, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#FFFFFF"
    fill-opacity="0.5"
  >· Offline. Ohne Cloud. Ohne Installation.</text>
</svg>
